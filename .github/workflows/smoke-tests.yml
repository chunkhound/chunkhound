name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export CHUNKHOUND_TEST_WATCHER_MODE=polling
          fi

          echo "::group::Test collection check"
          uv run pytest tests/ --collectonly -q --tb=no
          echo "::endgroup::"

          echo "::group::Watcher marker collection"
          uv run pytest tests/ --collectonly -q -m native_watcher --tb=no
          uv run pytest tests/ --collectonly -q -m polling_watcher --tb=no
          echo "::endgroup::"

          echo "::group::Full test suite"
          if [ "$RUNNER_OS" = "Windows" ]; then
            uv run pytest tests/ -v --reruns 2 --reruns-delay 5 --only-rerun "AssertionError"
          else
            uv run pytest tests/ -v
          fi
          echo "::endgroup::"
