name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        shell: bash
        run: |
          echo "::group::Test collection check"
          uv run pytest tests/ --collectonly -q --tb=no
          echo "::endgroup::"

          # Full test suite (with retries on Windows for flaky realtime tests)
          echo "::group::Full test suite"
          if [ "$RUNNER_OS" = "Windows" ]; then
            uv run pytest tests/ -v --reruns 2 --reruns-delay 5 --only-rerun "AssertionError"
          else
            uv run pytest tests/ -v
          fi
          echo "::endgroup::"

  watchman-runtime-validation:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CHUNKHOUND_RUN_WATCHMAN_RUNTIME_VALIDATION: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --locked

      - name: Prepare Linux mount-aware Watchman fixture
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo mkdir -p /workspaces
          if ! mountpoint -q /workspaces; then
            sudo mount -t tmpfs -o size=256m tmpfs /workspaces
          fi
          sudo mkdir -p /workspaces/chunkhound_workspace
          if ! mountpoint -q /workspaces/chunkhound_workspace; then
            sudo mount -t tmpfs -o size=256m tmpfs /workspaces/chunkhound_workspace
          fi
          sudo chown -R "$(id -u):$(id -g)" /workspaces
          {
            echo "CHUNKHOUND_TEST_WATCHMAN_MOUNT_PARENT=/workspaces"
            echo "CHUNKHOUND_TEST_WATCHMAN_MOUNT_CHILD=/workspaces/chunkhound_workspace"
          } >> "$GITHUB_ENV"

      - name: Run Watchman runtime validation tests
        run: >
          uv run pytest
          tests/
          -m requires_native_watchman
          -q

      - name: Build wheel artifacts
        run: CHUNKHOUND_BUILD_PACKAGED_WATCHMAN_RUNTIME=1 uv build --wheel --clear

      - name: Verify Watchman runtime wheel artifacts
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [[ ${#wheels[@]} -eq 0 ]]; then
            echo "No wheel produced in dist/"
            exit 1
          fi
          uv run python scripts/verify_watchman_runtime_resources.py "${wheels[@]}"

      - name: Verify installed-wheel Watchman live mutation e2e
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [[ ${#wheels[@]} -eq 0 ]]; then
            echo "No wheel produced in dist/"
            exit 1
          fi
          uv run python scripts/verify_watchman_live_indexing_e2e.py "${wheels[@]}"

      - name: Upload Watchman wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchman-wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  watchman-rollout-gate:
    needs: watchman-runtime-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CHUNKHOUND_RUN_WATCHMAN_RUNTIME_VALIDATION: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --locked

      - name: Download staged Watchman wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: watchman-wheel-*
          path: dist
          merge-multiple: true

      - name: Verify full supported Watchman wheel matrix
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [[ ${#wheels[@]} -eq 0 ]]; then
            echo "No wheel artifacts downloaded into dist/"
            exit 1
          fi
          uv run python scripts/verify_watchman_runtime_resources.py --require-supported-matrix "${wheels[@]}"

      - name: Verify source/editable Watchman fallback contract
        run: >-
          uv run python scripts/verify_watchman_live_indexing_e2e.py
          --verify-source-fallback
          --source-root .
