name: Tests

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --locked

      - name: Test collection check
        run: uv run pytest tests/ --collect-only -q --tb=no

      - name: Run tests
        id: tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 28
          max_attempts: 2
          command: uv run pytest tests/ -v --junit-xml=test-results.xml

      - name: Check flaky annotations
        if: failure() && steps.tests.outcome == 'failure'
        run: uv run python scripts/check_flaky_annotations.py test-results.xml
