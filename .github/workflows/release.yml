name: Release

on:
  release:
    types: [published]

permissions:
  contents: write  # gh release delete --cleanup-tag on failure
  id-token: write  # OIDC Trusted Publishing

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs requires full history for version derivation

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build source distribution
        run: uv build --sdist --out-dir dist

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-runtime-wheels:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs requires full history for version derivation

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build packaged Watchman runtime wheel
        env:
          CHUNKHOUND_BUILD_PACKAGED_WATCHMAN_RUNTIME: "1"
        run: uv build --wheel --clear

      - name: Upload runtime wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  build-native-wheel:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.12  # abi3 wheel runs on Python 3.10+
        run: uv python install 3.12

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build native wheel
        shell: bash
        run: |
          # maturin build has no --set-version flag; it reads the wheel version from
          # Cargo.toml's [package] version. Cargo requires strict SemVer (a hyphen
          # before any pre-release suffix) while the git tag uses PEP 440 (no
          # hyphen, e.g. 5.2.0a3) -- convert before patching. maturin parses the
          # Cargo version via pep440_rs, which normalizes the hyphenated form to
          # the same PEP 440 version, so the wheel still ends up as 5.2.0a3.
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          uv run --no-project --python 3.12 python - <<'PYEOF'
          import os, re, pathlib

          tag_version = os.environ["TAG_VERSION"]
          m = re.match(r"^(\d+\.\d+\.\d+)([a-zA-Z].*)?$", tag_version)
          cargo_version = f"{m.group(1)}-{m.group(2)}" if m.group(2) else m.group(1)

          path = pathlib.Path("Cargo.toml")
          text = path.read_text()
          new_text = re.sub(r'(?m)^version = ".*"', f'version = "{cargo_version}"', text, count=1)
          path.write_text(new_text)
          PYEOF
          # maturin treats a sibling pyproject.toml as authoritative package metadata
          # ("mixed" Rust/Python project support), which misnames this wheel as
          # "chunkhound" (the main package) instead of "chunkhound_native". Hide the
          # Python package's pyproject.toml for the build; nothing else in this job
          # needs it (the uv commands above already use --no-project).
          mv pyproject.toml pyproject.toml.hidden
          uvx --python 3.12 maturin build --release --out dist/
          mv pyproject.toml.hidden pyproject.toml

      - name: Smoke test native wheel
        shell: bash
        run: |
          # Run outside the repo root: the repo's own chunkhound_native/__init__.py
          # source-tree stub (kept so `maturin develop` re-exports survive editable
          # reinstalls locally) would otherwise shadow the installed wheel package,
          # since it expects a compiled extension sitting next to it that only
          # exists after a local editable build, not in this CI job.
          WHEEL_DIR="$(pwd)/dist"
          TMP_DIR="$(mktemp -d)"
          cd "$TMP_DIR"
          uv run --no-project --python 3.12 --with "$WHEEL_DIR"/chunkhound_native-*.whl \
            python -c "from chunkhound_native import scan_files; r = scan_files('.', ['py']); assert isinstance(r, list)"

      - name: Upload native wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-native-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    needs: [build-sdist, build-runtime-wheels, build-native-wheel]
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 15

    steps:
      - name: Download main distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-dist-{sdist,ubuntu-latest,windows-latest}
          path: dist
          merge-multiple: true

      - name: Publish chunkhound to PyPI
        id: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Cleanup on failure (delete release and tag)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.event.release.tag_name }}" \
            --cleanup-tag \
            --yes \
            --repo "${{ github.repository }}"

  publish-native:
    needs: [publish]
    runs-on: ubuntu-latest
    # Separate environment so this job carries an OIDC token scoped to the
    # chunkhound-native PyPI project (each project needs its own trusted-publisher
    # entry referencing this environment name). Depends on publish so the main
    # package is confirmed live before attempting the native publish — avoids
    # deleting a successfully-published release if only the native wheel fails.
    environment: pypi-native
    timeout-minutes: 15

    steps:
      - name: Download native wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-dist-native-*
          path: dist-native
          merge-multiple: true

      - name: Publish chunkhound-native to PyPI
        id: publish-native
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-native
