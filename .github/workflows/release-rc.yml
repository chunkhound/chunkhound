name: RC Release

on:
  push:
    tags:
      - 'v*rc*'  # e.g. v1.2.0rc1 (PEP 440 release candidate)
      - 'v*b*'   # e.g. v1.2.0b1  (PEP 440 beta)
      - 'v*a*'   # e.g. v1.2.0a1  (PEP 440 alpha)
      # tag push by maintainer is the human gate (protected via tag ruleset)

permissions:
  id-token: write  # OIDC Trusted Publishing

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 15

    steps:
      - name: Validate pre-release tag format (PEP 440)
        shell: python
        run: |
          import re, sys
          tag = "${{ github.ref_name }}"
          if not re.match(r'^v\d+\.\d+\.\d+(a|b|rc)\d+$', tag):
              print(f"::error::Tag {tag!r} is not a valid PEP 440 pre-release (expected vX.Y.Z(a|b|rc)N)")
              sys.exit(1)

  build-sdist:
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs requires full history for version derivation

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build source distribution
        run: uv build --sdist --out-dir dist

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-rc-dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-runtime-wheels:
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs requires full history for version derivation

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build packaged Watchman runtime wheel
        env:
          CHUNKHOUND_BUILD_PACKAGED_WATCHMAN_RUNTIME: "1"
        run: uv build --wheel --clear

      - name: Upload runtime wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-rc-dist-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  build-native-wheel:
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.12  # abi3 wheel runs on Python 3.10+
        run: uv python install 3.12

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build native wheel
        shell: bash
        run: |
          # maturin build has no --set-version flag; it reads the wheel version
          # from Cargo.toml's [package] version, so patch that field from the tag.
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml
          uvx --python 3.12 maturin build --release --out dist/

      - name: Upload native wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-rc-dist-native-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  publish-rc:
    needs: [build-sdist, build-runtime-wheels, build-native-wheel]
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 15

    steps:
      - name: Download main distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-rc-dist-{sdist,ubuntu-latest,windows-latest}
          path: dist
          merge-multiple: true

      - name: Publish chunkhound to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-rc-native:
    needs: [publish-rc]
    runs-on: ubuntu-latest
    # Separate environment so this job carries an OIDC token scoped to the
    # chunkhound-native PyPI project (each project needs its own trusted-publisher
    # entry referencing this environment name).
    environment: pypi-native
    timeout-minutes: 15

    steps:
      - name: Download native wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-rc-dist-native-*
          path: dist-native
          merge-multiple: true

      - name: Publish chunkhound-native to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-native
