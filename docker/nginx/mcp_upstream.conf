upstream chunkhound_backends {
    # Sticky routing by MCP session ID header.
    # The MCP streamableHttp transport sends "Mcp-Session-Id: <uuid>" on every
    # request after the session is established. Consistent hashing ensures the
    # same session always reaches the same backend — required because each
    # supergateway process maintains per-session stdio state.
    #
    # First request (no session ID yet) maps consistently to one backend;
    # subsequent requests in that session route deterministically.
    # Built-in nginx — no extra modules required.
    hash $http_mcp_session_id consistent;

    server chunkhound-1:8080;
    server chunkhound-2:8080;
    server chunkhound-3:8080;

    # Reuse upstream connections to reduce supergateway handshake overhead.
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://chunkhound_backends;

        # HTTP/1.1 keep-alive — NOT a WebSocket upgrade.
        # streamableHttp uses plain HTTP with SSE for server-to-client streaming.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming requires no buffering — without this nginx will hold the
        # response until the buffer fills, breaking real-time tool call updates.
        proxy_buffering           off;
        proxy_cache               off;
        chunked_transfer_encoding on;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Lightweight liveness probe — does not count as MCP traffic.
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
